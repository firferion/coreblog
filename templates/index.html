{{define "index_content"}}
<h1>Последние статьи</h1>
<div class="article-list">
    {{range .}}
    <article class="article-card">
        <h2><a href="/article/{{.Slug}}">{{.Title}}</a></h2>
        <div class="snippet">{{.Content}}</div>
        <p class="date">{{.CreatedAt.Format "02.01.2006"}}</p>
    </article>
    {{end}}
</div>
{{end}}
