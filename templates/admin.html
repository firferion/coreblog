{{define "admin_content"}}
<div class="admin-dashboard">
    <div class="admin-header">
        <h1>Панель управления</h1>
        <a href="/admin/editor" class="login-btn">+ Написать статью</a>
    </div>
    <table class="admin-table">
        <thead>
            <tr>
                <th>ID</th>
                <th>Заголовок</th>
                <th>Дата</th>
                <th class="actions-col">Действия</th>
            </tr>
        </thead>
        <tbody>
            {{range .Articles}}
            <tr>
                <td data-label="ID">#{{.ID}}</td>
                <td data-label="Заголовок">
                    <a href="/article/{{.Slug}}" class="article-link">{{.Title}}</a>
                </td>
                <td data-label="Дата">{{.CreatedAt.Format "02.01.2006"}}</td>
                <td data-label="Действия" class="actions-col">
                    <a href="/admin/editor?id={{.ID}}" class="edit-btn">✏️ Ред.</a>
                    <a href="/admin/delete?id={{.ID}}" class="delete-btn">🗑️ Удал.</a>
                </td>
            </tr>
            {{end}}
            {{if not .Articles}}
            <tr><td colspan="4" class="empty-state">У вас пока нет статей. Пора написать первую!</td></tr>
            {{end}}
        </tbody>
    </table>
</div>
{{end}}
